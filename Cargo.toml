[package]
name = "idtree"
version = "0.1.0"
edition = "2024"
license = "UNLICENSE"
description = "ID-Tree dynamic connectivity data structure"
repository = "https://github.com/Thell/idtree"
documentation = "https://docs.rs/idtree"

[lib]
name = "idtree"
crate-type = ["rlib", "cdylib"]

[dependencies]
fixedbitset = "0.5"
nohash-hasher = "0.2"
rapidhash = "4.4.1"
smallvec = "1"

[dev-dependencies]
divan = "0.1.21"

[features]
default = []
python = ["pyo3"]

[dependencies.pyo3]
version = "0.28.2"
optional = true
features = ["extension-module"]

[[bench]]
name = "bench"
harness = false
